<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: #2274ee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .campo { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #28a745; box-shadow: 0 0 5px rgba(40, 167, 69, 0.2); }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #218838; transform: translateY(-1px); }
        .footer-link { margin-top: 20px; font-size: 14px; }
        .footer-link a { color: #28a745; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">

    <h1>Criar Conta</h1>

    <form action="/cadastro" method="post">
        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required placeholder="Crie uma senha forte">
        </div>
        <button type="submit">Cadastrar</button>
    </form>


    {% if erro %}
       <p style="color: red"> {{ erro }}</p>
    {% endif %}


    <div class="footer-link">
        Já tem conta? <a href="/login">Faça login</a>
    </div>
</div>

</body>
</html>
